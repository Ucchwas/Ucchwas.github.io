# Site settings
title: "Ucchwas Talukder"
name: "Ucchwas Talukder"
email: "ucchwas09@gmail.com"
description: >-
  PhD Candidate, Texas Tech University. Real-time health monitoring, wearable devices,
  and AI for healthcare.

# URL settings (GitHub Pages)
baseurl: ""                # leave blank for username.github.io
url: "https://ucchwas09.github.io"

theme: minimal-mistakes-jekyll

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Which files become “pages” in the top nav
header_pages:
  - index.md
  - about.md
  - publications.md
  - projects.md
  - achievements.md

# Defaults for all pages
defaults:
  -
    scope:
      path: ""     # all files
      type: "pages"
    values:
      layout: single
      author_profile: false

# Custom navigation (footer & social)
footer:
  social:
    - title: "GitHub"
      url: https://github.com/Ucchwas
    - title: "LinkedIn"
      url: https://www.linkedin.com/in/ucchwas-talukder-utsha-98024518b/
    - title: "Google Scholar"
      url: https://scholar.google.com/citations?user=5d2l7uQAAAAJ
